services:

  db:
    image: postgres:16-alpine
    container_name: taskapp-db
    environment:
      POSTGRES_DB: taskapp
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"   # 5433 on host to avoid clash with your local postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskuser -d taskapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: taskapp:v1
    container_name: taskapp-web
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/taskapp
      SPRING_DATASOURCE_USERNAME: taskuser
      SPRING_DATASOURCE_PASSWORD: taskpass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
