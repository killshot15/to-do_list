<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Professional Task Timer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #FFC107;
            --primary-dark: #FFA000;
            --primary-light: #FFECB3;
            --secondary: #6C757D;
            --success: #28A745;
            --danger: #DC3545;
            --warning: #FF9800;
            --info: #17A2B8;
            --light: #F8F9FA;
            --dark: #212529;
            --background: #1E1E2E;
            --card-bg: #2D2D40;
            --text-primary: #E9ECEF;
            --text-secondary: #ADB5BD;
            --border-radius: 12px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
            --transition: all 0.3s ease;
        }

        .light-mode {
            --primary: #2B5CFF;
            --primary-dark: #1A4AE6;
            --primary-light: #D6E0FF;
            --secondary: #6C757D;
            --background: #F5F7FF;
            --card-bg: #FFFFFF;
            --text-primary: #333333;
            --text-secondary: #6C757D;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: var(--background);
            min-height: 100vh;
            padding: 20px;
            transition: var(--transition);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 24px;
            height: calc(100vh - 40px);
        }

        .header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 0 10px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary);
        }

        .logo i {
            font-size: 2rem;
        }

        .panel {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 24px;
            box-shadow: var(--shadow);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 193, 7, 0.1);
        }

        .light-mode .panel {
            border: 1px solid rgba(43, 92, 255, 0.1);
        }

        .panel-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            color: var(--primary);
        }

        .panel-header i {
            font-size: 1.4rem;
            margin-right: 12px;
            color: var(--primary);
        }

        .panel-header h2 {
            font-size: 1.4rem;
            font-weight: 600;
        }

        /* Calendar Styles */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .calendar-header h3 {
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .nav-btn {
            background: var(--card-bg);
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: var(--transition);
        }

        .nav-btn:hover {
            background: var(--primary);
            color: var(--dark);
        }

        .light-mode .nav-btn:hover {
            color: white;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-top: 10px;
        }

        .day-header {
            font-weight: 600;
            padding: 10px 0;
            color: var(--primary);
            font-size: 0.85rem;
            text-align: center;
        }

        .day {
            padding: 10px 0;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            font-size: 0.9rem;
        }

        .day:hover {
            background: rgba(255, 193, 7, 0.15);
        }

        .light-mode .day:hover {
            background: rgba(43, 92, 255, 0.15);
        }

        .day.today {
            background: var(--primary);
            color: var(--dark);
            font-weight: 600;
        }

        .light-mode .day.today {
            color: white;
        }

        .day.other-month {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        /* Clock Styles */
        .clock-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        .clock-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .clock-label {
            font-size: 1rem;
            font-weight: 500;
            color: var(--primary);
            margin-bottom: 12px;
            transition: var(--transition);
        }

        .clock {
            width: 180px;
            height: 180px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            position: relative;
            background: var(--card-bg);
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .clock-center {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background: var(--primary);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            transition: var(--transition);
        }

        .hand {
            position: absolute;
            background: var(--primary);
            transform-origin: bottom center;
            border-radius: 2px;
            transition: var(--transition);
        }

        .hour-hand {
            width: 4px;
            height: 50px;
            top: 40px;
            left: 50%;
            margin-left: -2px;
        }

        .minute-hand {
            width: 3px;
            height: 70px;
            top: 20px;
            left: 50%;
            margin-left: -1.5px;
        }

        .second-hand {
            width: 2px;
            height: 80px;
            top: 10px;
            left: 50%;
            margin-left: -1px;
            background: var(--danger);
        }

        .clock-numbers {
            position: absolute;
            width: 100%;
            height: 100%;
        }

        .number {
            position: absolute;
            font-weight: 600;
            font-size: 14px;
            color: var(--primary);
            transition: var(--transition);
        }

        .timer-clock {
            border-color: var(--primary);
        }

        .timer-clock .hand {
            background: var(--primary);
        }

        .timer-clock .clock-center {
            background: var(--primary);
        }

        .shake {
            animation: shake 0.5s infinite;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .digital-time {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary);
            margin-top: 12px;
            background: rgba(255, 193, 7, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            transition: var(--transition);
        }

        .light-mode .digital-time {
            background: rgba(43, 92, 255, 0.1);
        }

        /* Task Panel Styles */
        .task-form {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .light-mode .task-form {
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: var(--primary);
            font-size: 0.9rem;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid rgba(255, 193, 7, 0.3);
            border-radius: 8px;
            font-size: 14px;
            background: var(--card-bg);
            color: var(--text-primary);
            transition: var(--transition);
        }

        .light-mode .form-group input, 
        .light-mode .form-group select {
            border: 1px solid rgba(43, 92, 255, 0.3);
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 193, 7, 0.2);
        }

        .light-mode .form-group input:focus, 
        .light-mode .form-group select:focus {
            box-shadow: 0 0 0 3px rgba(43, 92, 255, 0.2);
        }

        .timer-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        .timer-inputs .input-with-label {
            display: flex;
            flex-direction: column;
        }

        .timer-inputs .input-label {
            font-size: 12px;
            color: var(--primary);
            margin-bottom: 4px;
            text-align: center;
        }

        .add-btn {
            background: var(--primary);
            color: var(--dark);
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            transition: var(--transition);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .light-mode .add-btn {
            color: white;
        }

        .add-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .task-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
        }

        .task-list::-webkit-scrollbar {
            width: 6px;
        }

        .task-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .task-list::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 3px;
            opacity: 0.5;
        }

        .task-item {
            background: rgba(255, 193, 7, 0.05);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid var(--primary);
            transition: var(--transition);
        }

        .light-mode .task-item {
            background: rgba(43, 92, 255, 0.05);
        }

        .task-item.active {
            border-left-color: var(--success);
            background: rgba(40, 167, 69, 0.1);
            box-shadow: 0 2px 10px rgba(40, 167, 69, 0.15);
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
            transition: var(--transition);
        }

        .task-title {
            font-weight: 500;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .task-timer {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary);
            background: rgba(255, 193, 7, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
            min-width: 85px;
            text-align: center;
        }

        .light-mode .task-timer {
            background: rgba(43, 92, 255, 0.1);
        }

        .task-item.active .task-timer {
            color: var(--success);
            background: rgba(40, 167, 69, 0.15);
        }

        .task-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 500;
        }

        .start-btn {
            background: var(--success);
            color: white;
        }

        .start-btn:hover {
            background: #218838;
            transform: translateY(-1px);
        }

        .stop-btn {
            background: var(--danger);
            color: white;
        }

        .stop-btn:hover {
            background: #C82333;
            transform: translateY(-1px);
        }

        .delete-btn {
            background: var(--secondary);
            color: white;
        }

        .delete-btn:hover {
            background: #5A6268;
            transform: translateY(-1px);
        }

        /* Custom Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: var(--transition);
            border: 1px solid var(--primary);
        }

        .modal-header {
            margin-bottom: 16px;
            text-align: center;
            color: var(--primary);
        }

        .modal-title {
            font-size: 1.4rem;
            color: var(--primary);
            margin-bottom: 8px;
            font-weight: 600;
        }

        .modal-message {
            color: var(--text-secondary);
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.5;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            transition: var(--transition);
        }

        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            min-width: 100px;
            transition: var(--transition);
            font-weight: 500;
        }

        .modal-btn.confirm {
            background: var(--success);
            color: white;
        }

        .modal-btn.confirm:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        .modal-btn.cancel {
            background: var(--secondary);
            color: white;
        }

        .modal-btn.cancel:hover {
            background: #5A6268;
            transform: translateY(-2px);
        }

        /* Theme Toggle Button */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            color: var(--primary);
            border: 1px solid var(--primary);
            border-radius: 25px;
            padding: 10px 16px;
            cursor: pointer;
            box-shadow: var(--shadow);
            font-size: 14px;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: var(--transition);
            font-weight: 500;
        }

        .theme-toggle:hover {
            background: var(--primary);
            color: var(--dark);
        }

        .light-mode .theme-toggle:hover {
            color: white;
        }

        @media (max-width: 1200px) {
            .container {
                grid-template-columns: 1fr 1fr;
                height: auto;
            }
            
            .panel {
                min-height: 400px;
            }
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 600px) {
            .header {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .theme-toggle {
                position: relative;
                top: 0;
                right: 0;
                align-self: flex-end;
            }
            
            .clock-container {
                flex-direction: row;
                justify-content: space-around;
            }
            
            .clock-section {
                width: auto;
            }
            
            .clock {
                width: 140px;
                height: 140px;
            }
            
            .hour-hand {
                height: 40px;
                top: 30px;
            }
            
            .minute-hand {
                height: 55px;
                top: 20px;
            }
            
            .second-hand {
                height: 65px;
                top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <i class="fas fa-clock"></i>
            <span>TaskFlow</span>
        </div>
        <button class="theme-toggle" id="themeToggle">
            <i class="fas fa-sun"></i>
            <span>Light Mode</span>
        </button>
    </div>

    <div class="container">
        <!-- Calendar Panel -->
        <div class="panel">
            <div class="panel-header">
                <i class="fas fa-calendar-alt"></i>
                <h2>Calendar</h2>
            </div>
            <div class="calendar">
                <div class="calendar-header">
                    <button class="nav-btn" onclick="previousMonth()">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <h3 id="monthYear"></h3>
                    <button class="nav-btn" onclick="nextMonth()">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
                <div class="calendar-grid" id="calendar"></div>
            </div>
        </div>

        <!-- Clocks Panel -->
        <div class="panel">
            <div class="panel-header">
                <i class="fas fa-stopwatch"></i>
                <h2>Time Tracker</h2>
            </div>
            <div class="clock-container">
                <div class="clock-section">
                    <div class="clock-label">Current Time</div>
                    <div class="clock" id="currentClock">
                        <div class="clock-numbers"></div>
                        <div class="hand hour-hand" id="currentHourHand"></div>
                        <div class="hand minute-hand" id="currentMinuteHand"></div>
                        <div class="hand second-hand" id="currentSecondHand"></div>
                        <div class="clock-center"></div>
                    </div>
                    <div class="digital-time" id="currentTime"></div>
                </div>

                <div class="clock-section">
                    <div class="clock-label">Task Timer</div>
                    <div class="clock timer-clock" id="timerClock">
                        <div class="clock-numbers"></div>
                        <div class="hand hour-hand" id="timerHourHand"></div>
                        <div class="hand minute-hand" id="timerMinuteHand"></div>
                        <div class="hand second-hand" id="timerSecondHand"></div>
                        <div class="clock-center"></div>
                    </div>
                    <div class="digital-time" id="timerTime">00:00:00</div>
                </div>
            </div>
        </div>

        <!-- Tasks Panel -->
        <div class="panel">
            <div class="panel-header">
                <i class="fas fa-tasks"></i>
                <h2>Task Manager</h2>
            </div>
            <div class="task-form">
                <div class="form-group">
                    <label for="taskName">Task Name</label>
                    <input type="text" id="taskName" placeholder="Enter task name">
                </div>
                <div class="form-group">
                    <label>Timer Duration</label>
                    <div class="timer-inputs">
                        <div class="input-with-label">
                            <span class="input-label">Hours</span>
                            <input type="number" id="hours" placeholder="HH" min="0" max="23" value="0">
                        </div>
                        <div class="input-with-label">
                            <span class="input-label">Minutes</span>
                            <input type="number" id="minutes" placeholder="MM" min="0" max="59" value="0">
                        </div>
                        <div class="input-with-label">
                            <span class="input-label">Seconds</span>
                            <input type="number" id="seconds" placeholder="SS" min="0" max="59" value="0">
                        </div>
                    </div>
                </div>
                <button class="add-btn" onclick="addTask()">
                    <i class="fas fa-plus"></i>
                    Add Task
                </button>
            </div>
            <div class="task-list" id="taskList"></div>
        </div>
    </div>

    <!-- Next Task Modal -->
    <div id="nextTaskModal" class="modal-overlay" style="display: none;">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Task Completed!</h3>
            </div>
            <p class="modal-message" id="nextTaskMessage">Would you like to start the next task?</p>
            <div class="modal-buttons">
                <button class="modal-btn confirm" onclick="handleNextTaskResponse(true)">
                    <i class="fas fa-check"></i> Yes
                </button>
                <button class="modal-btn cancel" onclick="handleNextTaskResponse(false)">
                    <i class="fas fa-times"></i> No
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentDate = new Date();
        let tasks = [];
        let activeTimer = null;
        let timerInterval = null;
        let nextTaskData = null;

        // Calendar functionality
        function renderCalendar() {
            const calendar = document.getElementById('calendar');
            const monthYear = document.getElementById('monthYear');
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            monthYear.textContent = new Date(year, month).toLocaleDateString('en-US', { 
                month: 'long', 
                year: 'numeric' 
            });
            
            // Update color based on theme
            monthYear.style.color = document.body.classList.contains('light-mode') ? '#333333' : '#E9ECEF';

            calendar.innerHTML = '';

            // Day headers
            const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            days.forEach(day => {
                const dayHeader = document.createElement('div');
                dayHeader.className = 'day-header';
                dayHeader.textContent = day;
                calendar.appendChild(dayHeader);
            });

            // Get first day of month and number of days
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = new Date();

            // Previous month's trailing days
            const prevMonth = new Date(year, month, 0).getDate();
            for (let i = firstDay - 1; i >= 0; i--) {
                const day = document.createElement('div');
                day.className = 'day other-month';
                day.textContent = prevMonth - i;
                calendar.appendChild(day);
            }

            // Current month days
            for (let day = 1; day <= daysInMonth; day++) {
                const dayElement = document.createElement('div');
                dayElement.className = 'day';
                dayElement.textContent = day;
                
                if (year === today.getFullYear() && 
                    month === today.getMonth() && 
                    day === today.getDate()) {
                    dayElement.classList.add('today');
                }
                
                calendar.appendChild(dayElement);
            }

            // Next month's leading days
            const totalCells = calendar.children.length - 7; // Subtract headers
            const remainingCells = 42 - totalCells; // 6 rows × 7 days
            for (let day = 1; day <= remainingCells; day++) {
                const dayElement = document.createElement('div');
                dayElement.className = 'day other-month';
                dayElement.textContent = day;
                calendar.appendChild(dayElement);
            }
        }

        function previousMonth() {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        }

        function nextMonth() {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        }

        // Clock functionality
        function updateCurrentClock() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            
            // Convert to 12-hour format
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12; // the hour '0' should be '12'

            const hourAngle = (hours * 30) + (minutes * 0.5);
            const minuteAngle = minutes * 6;
            const secondAngle = seconds * 6;

            document.getElementById('currentHourHand').style.transform = `rotate(${hourAngle}deg)`;
            document.getElementById('currentMinuteHand').style.transform = `rotate(${minuteAngle}deg)`;
            document.getElementById('currentSecondHand').style.transform = `rotate(${secondAngle}deg)`;

            // Format time as HH:MM:SS AM/PM
            const timeString = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')} ${ampm}`;
            document.getElementById('currentTime').textContent = timeString;
        }

        function updateTimerClock() {
            if (!activeTimer) {
                document.getElementById('timerTime').textContent = '00:00:00';
                document.getElementById('timerHourHand').style.transform = 'rotate(0deg)';
                document.getElementById('timerMinuteHand').style.transform = 'rotate(0deg)';
                document.getElementById('timerSecondHand').style.transform = 'rotate(0deg)';
                return;
            }

            const totalSeconds = activeTimer.remainingTime;
            const hours = Math.floor(totalSeconds / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;

            // Calculate angles for timer display
            const hourAngle = (hours % 12) * 30 + (minutes * 0.5);
            const minuteAngle = minutes * 6;
            const secondAngle = seconds * 6;

            document.getElementById('timerHourHand').style.transform = `rotate(${hourAngle}deg)`;
            document.getElementById('timerMinuteHand').style.transform = `rotate(${minuteAngle}deg)`;
            document.getElementById('timerSecondHand').style.transform = `rotate(${secondAngle}deg)`;

            const timeString = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            document.getElementById('timerTime').textContent = timeString;
        }

        // Add clock numbers
        function addClockNumbers() {
            const clocks = document.querySelectorAll('.clock-numbers');
            clocks.forEach(clockNumbers => {
                for (let i = 1; i <= 12; i++) {
                    const number = document.createElement('div');
                    number.className = 'number';
                    number.textContent = i;
                    
                    const angle = (i * 30 - 90) * (Math.PI / 180);
                    const radius = 75;
                    const x = Math.cos(angle) * radius + 92;
                    const y = Math.sin(angle) * radius + 92;
                    
                    number.style.left = x + 'px';
                    number.style.top = y + 'px';
                    number.style.transform = 'translate(-50%, -50%)';
                    
                    clockNumbers.appendChild(number);
                }
            });
        }

        // Task management
        function addTask() {
            const taskName = document.getElementById('taskName').value.trim();
            const hours = parseInt(document.getElementById('hours').value) || 0;
            const minutes = parseInt(document.getElementById('minutes').value) || 0;
            const seconds = parseInt(document.getElementById('seconds').value) || 0;

            if (!taskName) {
                alert('Please enter a task name');
                return;
            }

            if (hours === 0 && minutes === 0 && seconds === 0) {
                alert('Please set a timer duration');
                return;
            }

            const totalSeconds = hours * 3600 + minutes * 60 + seconds;
            const task = {
                id: Date.now(),
                name: taskName,
                duration: totalSeconds,
                remainingTime: totalSeconds,
                isActive: false
            };

            tasks.push(task);
            renderTasks();

            // Clear form
            document.getElementById('taskName').value = '';
            document.getElementById('hours').value = '0';
            document.getElementById('minutes').value = '0';
            document.getElementById('seconds').value = '0';
        }

        function renderTasks() {
            const taskList = document.getElementById('taskList');
            taskList.innerHTML = '';

            tasks.forEach(task => {
                const taskElement = document.createElement('div');
                taskElement.className = `task-item ${task.isActive ? 'active' : ''}`;
                
                const hours = Math.floor(task.remainingTime / 3600);
                const minutes = Math.floor((task.remainingTime % 3600) / 60);
                const seconds = task.remainingTime % 60;
                const timeString = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

                taskElement.innerHTML = `
                    <div class="task-header">
                        <div class="task-title">${task.name}</div>
                        <div class="task-timer">${timeString}</div>
                    </div>
                    <div class="task-actions">
                        ${!task.isActive ? 
                            `<button class="btn start-btn" onclick="startTask(${task.id})"><i class="fas fa-play"></i> Start</button>` :
                            `<button class="btn stop-btn" onclick="stopTask(${task.id})"><i class="fas fa-pause"></i> Stop</button>`
                        }
                        <button class="btn delete-btn" onclick="deleteTask(${task.id})"><i class="fas fa-trash"></i> Delete</button>
                    </div>
                `;

                taskList.appendChild(taskElement);
            });
        }

        function startTask(taskId) {
            // Stop any active timer
            if (activeTimer) {
                stopTask(activeTimer.id);
            }

            const task = tasks.find(t => t.id === taskId);
            if (task && task.remainingTime > 0) {
                task.isActive = true;
                activeTimer = task;
                
                timerInterval = setInterval(() => {
                    activeTimer.remainingTime--;
                    updateTimerClock();
                    renderTasks();

                    if (activeTimer.remainingTime <= 0) {
                        // Timer finished - shake the clock for 5 seconds
                        const timerClock = document.getElementById('timerClock');
                        timerClock.classList.add('shake');
                        
                        const completedTaskId = activeTimer.id;
                        const completedTaskName = activeTimer.name;
                        stopTask(activeTimer.id);
                        
                        // Show completion alert
                        alert(`Task "${completedTaskName}" completed!`);
                        
                        // Remove shake after 5 seconds
                        setTimeout(() => {
                            timerClock.classList.remove('shake');
                        }, 5000);
                        
                        // Check for next task and ask permission
                        setTimeout(() => {
                            startNextTask(completedTaskId);
                        }, 100);
                    }
                }, 1000);

                renderTasks();
                updateTimerClock();
            }
        }

        function startNextTask(completedTaskId) {
            // Find the next task with remaining time
            const nextTask = tasks.find(task => 
                task.id !== completedTaskId && 
                task.remainingTime > 0 && 
                !task.isActive
            );
            
            if (nextTask) {
                // Store data for the next task
                nextTaskData = {
                    taskId: nextTask.id,
                    taskName: nextTask.name
                };
                
                // Show modal to ask permission to continue with next task
                document.getElementById('nextTaskMessage').textContent = 
                    `Would you like to start the next task: "${nextTask.name}"?`;
                document.getElementById('nextTaskModal').style.display = 'flex';
            }
        }

        function handleNextTaskResponse(shouldStart) {
            // Hide the modal
            document.getElementById('nextTaskModal').style.display = 'none';
            
            if (shouldStart && nextTaskData) {
                // Start the next task
                startTask(nextTaskData.taskId);
            }
            
            // Reset next task data
            nextTaskData = null;
        }

        function stopTask(taskId) {
            const task = tasks.find(t => t.id === taskId);
            if (task) {
                task.isActive = false;
            }

            if (activeTimer && activeTimer.id === taskId) {
                clearInterval(timerInterval);
                activeTimer = null;
                timerInterval = null;
            }

            renderTasks();
            updateTimerClock();
        }

        function deleteTask(taskId) {
            if (activeTimer && activeTimer.id === taskId) {
                stopTask(taskId);
            }
            
            tasks = tasks.filter(t => t.id !== taskId);
            renderTasks();
        }

        // Theme toggle functionality
        function setupThemeToggle() {
            const themeToggle = document.getElementById('themeToggle');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const savedTheme = localStorage.getItem('theme');
            
            // Set initial theme
            if (savedTheme === 'light' || (!savedTheme && !prefersDark)) {
                document.body.classList.add('light-mode');
                themeToggle.innerHTML = '<i class="fas fa-moon"></i><span>Dark Mode</span>';
            } else {
                themeToggle.innerHTML = '<i class="fas fa-sun"></i><span>Light Mode</span>';
            }
            
            // Toggle theme on button click
            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('light-mode');
                
                if (document.body.classList.contains('light-mode')) {
                    localStorage.setItem('theme', 'light');
                    themeToggle.innerHTML = '<i class="fas fa-moon"></i><span>Dark Mode</span>';
                } else {
                    localStorage.setItem('theme', 'dark');
                    themeToggle.innerHTML = '<i class="fas fa-sun"></i><span>Light Mode</span>';
                }
                
                // Update calendar colors
                renderCalendar();
            });
        }

        // Initialize the application
        function init() {
            renderCalendar();
            addClockNumbers();
            updateCurrentClock();
            updateTimerClock();
            setupThemeToggle();
            
            // Update current time every second
            setInterval(updateCurrentClock, 1000);
        }

        // Run initialization when page loads
        window.onload = init;
    </script>
</body>
</html>
